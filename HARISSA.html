<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>HARISSA</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#e6cfb0;
    text-align:center;
}

/* écran de bienvenue */
#welcomeScreen{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* boite centrale */
.welcomeBox{
    background:white;
    padding:80px;
    border-radius:15px;
    box-shadow:0px 0px 15px gray;
    width:600px;
}

/* titre principal */
.welcomeBox h1{
    font-size:40px;
}

/* sous titre */
.welcomeBox h3{
    font-size:22px;
    margin-top:10px;
}

/* image */
.welcomeImage{
    width:300px;
    margin:30px 0;
}

/* bouton jouer */
.playBtn{
    padding:15px 35px;
    font-size:20px;
    background:#ff4d4d;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.playBtn:hover{
    background:#cc0000;
}

/* zone du jeu cachée au début */
#gameContainer{
    display:none;
}

/* zone score */
#scoreZone{
    margin-top:10px;
    font-size:18px;
}

/* zone du jeu */
#gameArea{
    width:800px;
    height:300px;
    border:3px solid black;
    margin:30px auto;
    background:#eee;
}

button{
    padding:10px 20px;
    font-size:16px;
    margin:10px;
}

/* animation apparition */
.fade{
    animation:fadeIn 0.5s;
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

</style>

</head>

<body>

<!-- PAGE BIENVENUE -->

<div id="welcomeScreen">

<div class="welcomeBox">

<h1>Bienvenue dans HARISSA</h1>

<h3>TUNISIAN WORLD HRISSA</h3>

<img src="bienvenue.png" class="welcomeImage">

<br>

<button class="playBtn" onclick="startGame()">Jouer</button>

</div>

</div>

<!-- PAGE DU JEU -->

<div id="gameContainer">

<h1>HARISSA</h1>

<div id="scoreZone">
Score : 0 | Score précédent : 0
</div>

<div id="gameArea"></div>

<div>
<button>Start</button>
<button>Restart</button>
</div>

</div>
<audio id="startSound" src="musique1.mp3"></audio>
<script>

function startGame(){

document.getElementById("startSound").play();

document.getElementById("welcomeScreen").style.display = "none";

let game = document.getElementById("gameContainer");

game.style.display = "block";

game.classList.add("fade");

}

</script>

</body>

</html>
