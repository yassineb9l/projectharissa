<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>HARISSA</title>

    <!-- Google Fonts : pixel art + titre arrondi -->
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Fredoka+One&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ============================================================
   CSS — HARISSA Jump & Run
   Thème : Tunisie – désert, sable, monuments pixel art
   Auteur : Youssef
   ============================================================ */

      /* ── Variables de couleurs ────────────────────────────────── */
      :root {
        --sand-light: #f5d98b;
        --sand-mid: #e6cfb0;
        --sand-dark: #c8963e;
        --sky-blue: #87ceeb;
        --sky-horizon: #fad6a5;
        --red-tunisia: #e63946;
        --red-dark: #c1121f;
        --text-dark: #3d1e00;
      }

      /* ── Reset ────────────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      /* ── Body ─────────────────────────────────────────────────── */
      body {
        margin: 0;
        font-family: "Fredoka One", Arial, sans-serif;
        background: linear-gradient(
          180deg,
          var(--sky-blue) 0%,
          var(--sky-horizon) 30%,
          var(--sand-mid) 60%
        );
        background-attachment: fixed;
        min-height: 100vh;
        text-align: center;
      }

      /* ══════════════════════════════════════════════════════════
   ÉCRAN DE BIENVENUE
   ══════════════════════════════════════════════════════════ */

      #welcomeScreen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(
          160deg,
          #87ceeb 0%,
          #fad6a5 50%,
          #e6cfb0 100%
        );
        z-index: 100;
      }

      /* ── Boîte centrale ───────────────────────────────────────── */
      .welcomeBox {
        background: linear-gradient(135deg, #fffbf0 0%, #fff3d0 100%);
        padding: 50px 60px;
        border-radius: 20px;
        border: 4px solid var(--sand-dark);
        box-shadow:
          0 0 0 3px var(--sand-light),
          0 12px 40px rgba(0, 0, 0, 0.3);
        width: 820px;
        position: relative;
        overflow: hidden;
        animation: welcomePop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }

      /* Bande rouge/blanc en haut (drapeau tunisien) */
      .welcomeBox::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 8px;
        background: repeating-linear-gradient(
          90deg,
          var(--red-tunisia) 0px 20px,
          white 20px 40px
        );
      }

      @keyframes welcomePop {
        from {
          opacity: 0;
          transform: scale(0.8) translateY(20px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }

      /* ── Titre principal ──────────────────────────────────────── */
      .welcomeBox h1 {
        font-family: "Press Start 2P", cursive;
        font-size: 28px;
        color: var(--red-tunisia);
        text-shadow:
          3px 3px 0 var(--red-dark),
          5px 5px 8px rgba(0, 0, 0, 0.15);
        margin-top: 14px;
        line-height: 1.5;
        white-space: nowrap;
        animation: titleBounce 2s ease-in-out infinite;
      }

      @keyframes titleBounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-5px);
        }
      }

      /* ── Sous-titre ───────────────────────────────────────────── */
      .welcomeBox h3 {
        font-family: "Fredoka One", cursive;
        font-size: 20px;
        color: var(--sand-dark);
        margin-top: 10px;
        letter-spacing: 1px;
      }

      /* ── Image de bienvenue ───────────────────────────────────── */
      .welcomeImage {
        width: 260px;
        margin: 28px auto;
        display: block;
        image-rendering: pixelated;
        animation: harissaBounce 0.9s ease-in-out infinite alternate;
        filter: drop-shadow(4px 6px 8px rgba(0, 0, 0, 0.2));
      }

      @keyframes harissaBounce {
        from {
          transform: translateY(0) rotate(-2deg);
        }
        to {
          transform: translateY(-10px) rotate(2deg);
        }
      }

      /* ── Bouton Jouer ─────────────────────────────────────────── */
      .playBtn {
        font-family: "Press Start 2P", cursive;
        font-size: 14px;
        padding: 16px 40px;
        background: var(--red-tunisia);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        box-shadow:
          0 6px 0 var(--red-dark),
          0 8px 20px rgba(198, 18, 31, 0.4);
        transition: all 0.1s ease;
        letter-spacing: 1px;
        animation: blinkBtn 2s ease-in-out infinite;
      }

      .playBtn:hover {
        background: var(--red-dark);
        transform: translateY(2px);
        box-shadow: 0 4px 0 #8b0000;
      }

      .playBtn:active {
        transform: translateY(6px);
        box-shadow: none;
      }

      @keyframes blinkBtn {
        0%,
        88%,
        100% {
          opacity: 1;
        }
        94% {
          opacity: 0.55;
        }
      }

      /* ══════════════════════════════════════════════════════════
   ZONE DU JEU
   ══════════════════════════════════════════════════════════ */

      #gameContainer {
        display: none;
        padding-top: 20px;
        padding-bottom: 30px;
      }

      /* Titre HARISSA dans la zone de jeu */
      #gameContainer h1 {
        font-family: "Press Start 2P", cursive;
        font-size: 24px;
        color: var(--red-tunisia);
        text-shadow: 2px 2px 0 var(--red-dark);
        margin-bottom: 10px;
        letter-spacing: 2px;
      }

      /* ── Zone score ───────────────────────────────────────────── */
      #scoreZone {
        font-family: "Press Start 2P", cursive;
        font-size: 12px;
        color: var(--text-dark);
        background: rgba(255, 255, 255, 0.65);
        display: inline-block;
        padding: 10px 28px;
        border-radius: 10px;
        border: 2px solid var(--sand-dark);
        margin: 6px auto;
        box-shadow: 0 3px 0 var(--sand-dark);
        letter-spacing: 1px;
      }

      /* ── Zone de jeu (terrain) ────────────────────────────────── */
      #gameArea {
        width: 800px;
        height: 300px;
        border: 4px solid var(--sand-dark);
        margin: 20px auto;
        position: relative;
        overflow: hidden;
        border-radius: 10px;
        /* Décor : ciel + horizon + sol sable */
        background:
          linear-gradient(
            to bottom,
            transparent 0%,
            transparent 72%,
            var(--sand-light) 72%,
            var(--sand-mid) 86%,
            var(--sand-dark) 100%
          ),
          linear-gradient(
            180deg,
            #87ceeb 0%,
            #b8e0f5 45%,
            #fad6a5 70%,
            #f5c07a 100%
          );
        box-shadow:
          0 6px 0 var(--sand-dark),
          0 10px 25px rgba(0, 0, 0, 0.3);
      }

      /* Soleil dans le coin */
      #gameArea::before {
        content: none;
      }

      @keyframes sunPulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.1);
        }
      }

      /* ── Boutons Start / Restart ──────────────────────────────── */
      button {
        font-family: "Fredoka One", cursive;
        font-size: 16px;
        padding: 12px 28px;
        margin: 8px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      button:hover {
        transform: scale(1.08) translateY(-2px);
      }
      button:active {
        transform: scale(0.95);
      }

      /* Premier bouton = Start (rouge) */
      #gameContainer div button:first-child {
        background: var(--red-tunisia);
        color: white;
        box-shadow: 0 5px 0 var(--red-dark);
      }
      #gameContainer div button:first-child:hover {
        background: var(--red-dark);
      }

      /* Deuxième bouton = Restart (bleu) */
      #gameContainer div button:last-child {
        background: #457b9d;
        color: white;
        box-shadow: 0 5px 0 #1d3557;
      }
      #gameContainer div button:last-child:hover {
        background: #1d3557;
      }

      /* ── Animation fade (utilisée par JS) ────────────────────── */
      .fade {
        animation: fadeIn 0.5s ease both;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(15px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ══════════════════════════════════════════════════════════
   PERSONNAGE & OBSTACLES (pour le JS de Gabriel/Mohamed)
   ══════════════════════════════════════════════════════════ */

      /* Harissa en jeu */
      #harissa {
        position: absolute;
        bottom: 75px;
        left: 80px;
        width: 70px;
        height: 80px;
        image-rendering: pixelated;
        animation: run 0.4s steps(2) infinite;
        z-index: 5;
      }

      @keyframes run {
        0% {
          transform: rotate(-3deg);
        }
        50% {
          transform: rotate(3deg);
        }
        100% {
          transform: rotate(-3deg);
        }
      }

      #harissa.jumping {
        animation: jumpAnim 0.5s ease forwards;
      }

      @keyframes jumpAnim {
        0% {
          transform: scaleY(1.1) rotate(0deg);
        }
        40% {
          transform: scaleY(0.95) rotate(-12deg);
        }
        100% {
          transform: scaleY(1) rotate(0deg);
        }
      }

      #harissa.ducking {
        animation: none;
        transform: scaleY(0.5) translateY(32px);
      }

      #harissa.dead {
        animation: shake 0.4s ease;
        filter: drop-shadow(0 0 12px rgba(255, 0, 0, 0.7));
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-7px) rotate(-5deg);
        }
        75% {
          transform: translateX(7px) rotate(5deg);
        }
      }

      /* Obstacles */
      .obstacle {
        position: absolute;
        bottom: 75px;
        image-rendering: pixelated;
        filter: drop-shadow(2px 5px 5px rgba(0, 0, 0, 0.35));
        z-index: 4;
      }

      /* Game Over */
      #gameArea.gameover::before {
        content: "GAME OVER";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: "Press Start 2P", cursive;
        font-size: 26px;
        color: white;
        background: rgba(180, 0, 0, 0.82);
        padding: 16px 32px;
        border-radius: 10px;
        border: 3px solid rgba(255, 255, 255, 0.4);
        z-index: 20;
        animation: gameOverFlash 0.5s ease both;
      }

      @keyframes gameOverFlash {
        0% {
          opacity: 0;
          transform: translate(-50%, -50%) scale(0.4);
        }
        60% {
          transform: translate(-50%, -50%) scale(1.06);
        }
        100% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1);
        }
      }

      /* Médailles */
      .medal {
        display: inline-block;
        font-size: 26px;
        margin-left: 10px;
        vertical-align: middle;
        animation: medalPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }

      @keyframes medalPop {
        from {
          opacity: 0;
          transform: scale(0) rotate(-20deg);
        }
        to {
          opacity: 1;
          transform: scale(1) rotate(0deg);
        }
      }
    </style>
  </head>

  <body>
    <!-- PAGE BIENVENUE -->
    <div id="welcomeScreen">
      <div class="welcomeBox">
        <h1>Welcome to HARISSA JUMP</h1>
        <img src="Bienvenue.png" class="welcomeImage" />
        <br />
        <button class="playBtn" onclick="startGame()">Play</button>
      </div>
    </div>

    <!-- PAGE DU JEU -->
    <div id="gameContainer">
      <h1>HARISSA JUMP</h1>
      <div id="scoreZone">Score : 0 | Score précédent : 0</div>
      <div id="gameArea"></div>
    </div>

    <audio id="musiqueJeu" loop></audio>
    <script src="Harissa.js"></script>

    <script>
      // Ajoute tes fichiers ici pour les inclure dans la rotation aléatoire
      const MUSIQUE_ACCUEIL = "musique1.mp3";
      const MUSIQUES_JEU = ["musique2.mp3", "musique3.mp3", "musique4.mp3"];
      let indexMusique = 0;

      function jouerMusiqueAleatoire() {
        const musique = document.getElementById("musiqueJeu");
        musique.src = MUSIQUES_JEU[indexMusique % MUSIQUES_JEU.length];
        indexMusique++;
        musique.currentTime = 0;
        musique.play();
      }

      function startGame() {
        const musique = document.getElementById("musiqueJeu");
        musique.src = MUSIQUE_ACCUEIL;
        musique.currentTime = 0;
        musique.play();
        document.getElementById("welcomeScreen").style.display = "none";
        let game = document.getElementById("gameContainer");
        game.style.display = "block";
        game.classList.add("fade");
      }
    </script>
  </body>
</html>
