<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HARISSA</title>

    <!-- Google Fonts: pixel art + rounded title -->
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Fredoka+One&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ============================================================
   CSS — HARISSA Jump & Run
   Theme: Tunisia – desert, sand, pixel art monuments
   Author: Youssef
   ============================================================ */

      /* ── Color variables ─────────────────────────────────────── */
      :root {
        --sand-light: #f5d98b;
        --sand-mid: #e6cfb0;
        --sand-dark: #c8963e;
        --sky-blue: #87ceeb;
        --sky-horizon: #fad6a5;
        --red-tunisia: #e63946;
        --red-dark: #c1121f;
        --text-dark: #3d1e00;
      }

      /* ── Reset ────────────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      /* ── Body ─────────────────────────────────────────────────── */
      body {
        margin: 0;
        font-family: "Fredoka One", Arial, sans-serif;
        background: linear-gradient(
          180deg,
          var(--sky-blue) 0%,
          var(--sky-horizon) 30%,
          var(--sand-mid) 60%
        );
        background-attachment: fixed;
        min-height: 100vh;
        text-align: center;
        overflow: hidden;
        position: relative;
      }

      /* ── Scale wrapper ───────────────────────────────────────── */
      #scaleWrapper {
        width: 1160px;
        position: absolute;
        top: 0;
        left: 0;
        transform-origin: top left;
      }

      /* ══════════════════════════════════════════════════════════
   WELCOME SCREEN
   ══════════════════════════════════════════════════════════ */

      #welcomeScreen {
        width: 1160px;
        min-height: 730px;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(
          160deg,
          #87ceeb 0%,
          #fad6a5 50%,
          #e6cfb0 100%
        );
      }

      /* ── Center box ──────────────────────────────────────────── */
      .welcomeBox {
        background: linear-gradient(135deg, #fffbf0 0%, #fff3d0 100%);
        padding: 50px 60px;
        border-radius: 20px;
        border: 4px solid var(--sand-dark);
        box-shadow:
          0 0 0 3px var(--sand-light),
          0 12px 40px rgba(0, 0, 0, 0.3);
        width: 820px;
        position: relative;
        overflow: hidden;
        animation: welcomePop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }

      /* Red/white stripe at top (Tunisian flag) */
      .welcomeBox::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 8px;
        background: repeating-linear-gradient(
          90deg,
          var(--red-tunisia) 0px 20px,
          white 20px 40px
        );
      }

      @keyframes welcomePop {
        from {
          opacity: 0;
          transform: scale(0.8) translateY(20px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }

      /* ── Main title ──────────────────────────────────────────── */
      .welcomeBox h1 {
        font-family: "Press Start 2P", cursive;
        font-size: 28px;
        color: var(--red-tunisia);
        text-shadow:
          3px 3px 0 var(--red-dark),
          5px 5px 8px rgba(0, 0, 0, 0.15);
        margin-top: 14px;
        line-height: 1.5;
        white-space: nowrap;
        animation: titleBounce 2s ease-in-out infinite;
      }

      @keyframes titleBounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-5px);
        }
      }

      /* ── Welcome image ───────────────────────────────────────── */
      .welcomeImage {
        width: 260px;
        margin: 28px auto;
        display: block;
        image-rendering: pixelated;
        animation: harissaBounce 0.9s ease-in-out infinite alternate;
        filter: drop-shadow(4px 6px 8px rgba(0, 0, 0, 0.2));
      }

      @keyframes harissaBounce {
        from {
          transform: translateY(0) rotate(-2deg);
        }
        to {
          transform: translateY(-10px) rotate(2deg);
        }
      }

      /* ── Play button ─────────────────────────────────────────── */
      .playBtn {
        font-family: "Press Start 2P", cursive;
        font-size: 14px;
        padding: 16px 40px;
        background: var(--red-tunisia);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        box-shadow:
          0 6px 0 var(--red-dark),
          0 8px 20px rgba(198, 18, 31, 0.4);
        transition: all 0.1s ease;
        letter-spacing: 1px;
        animation: blinkBtn 2s ease-in-out infinite;
      }

      .playBtn:hover {
        background: var(--red-dark);
        transform: translateY(2px);
        box-shadow: 0 4px 0 #8b0000;
      }

      .playBtn:active {
        transform: translateY(6px);
        box-shadow: none;
      }

      @keyframes blinkBtn {
        0%,
        88%,
        100% {
          opacity: 1;
        }
        94% {
          opacity: 0.55;
        }
      }

      /* ══════════════════════════════════════════════════════════
   GAME AREA
   ══════════════════════════════════════════════════════════ */

      #gameContainer {
        display: none;
        padding-top: 20px;
        padding-bottom: 30px;
      }

      /* HARISSA title in the game area */
      #gameContainer h1 {
        font-family: "Press Start 2P", cursive;
        font-size: 24px;
        color: var(--red-tunisia);
        text-shadow: 2px 2px 0 var(--red-dark);
        margin-bottom: 10px;
        letter-spacing: 2px;
      }

      /* ── Score area ──────────────────────────────────────────── */
      #scoreZone {
        font-family: "Press Start 2P", cursive;
        font-size: 12px;
        color: var(--text-dark);
        background: rgba(255, 255, 255, 0.65);
        display: inline-block;
        padding: 10px 28px;
        border-radius: 10px;
        border: 2px solid var(--sand-dark);
        margin: 6px auto;
        box-shadow: 0 3px 0 var(--sand-dark);
        letter-spacing: 1px;
      }

      /* ── Game terrain ────────────────────────────────────────── */
      #gameArea {
        width: 1100px;
        height: 450px;
        border: 4px solid var(--sand-dark);
        margin: 20px auto;
        position: relative;
        overflow: hidden;
        border-radius: 10px;
        /* Decor: sky + horizon + sand floor */
        background:
          linear-gradient(
            to bottom,
            transparent 0%,
            transparent 72%,
            var(--sand-light) 72%,
            var(--sand-mid) 86%,
            var(--sand-dark) 100%
          ),
          linear-gradient(
            180deg,
            #87ceeb 0%,
            #b8e0f5 45%,
            #fad6a5 70%,
            #f5c07a 100%
          );
        box-shadow:
          0 6px 0 var(--sand-dark),
          0 10px 25px rgba(0, 0, 0, 0.3);
      }

      /* ── Buttons ─────────────────────────────────────────────── */
      button {
        font-family: "Fredoka One", cursive;
        font-size: 16px;
        padding: 12px 28px;
        margin: 8px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      button:hover {
        transform: scale(1.08) translateY(-2px);
      }
      button:active {
        transform: scale(0.95);
      }

      /* ── Fade animation (used by JS) ─────────────────────────── */
      .fade {
        animation: fadeIn 0.5s ease both;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(15px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

    </style>
  </head>

  <body>
    <div id="scaleWrapper">
    <!-- WELCOME PAGE -->
    <div id="welcomeScreen">
      <div class="welcomeBox">
        <h1>Welcome to HARISSA JUMP</h1>
        <img src="Bienvenue.png" class="welcomeImage" />
        <button class="playBtn" onclick="startGame()">Play</button>
      </div>
    </div>

    <!-- GAME PAGE -->
    <div id="gameContainer">
      <h1>HARISSA JUMP</h1>
      <div id="scoreZone">Score : 0 | Record : 0</div>
      <div id="gameArea"></div>
    </div>

    </div><!-- end scaleWrapper -->

    <audio id="musiqueJeu"></audio>
    <script src="Harissa.js"></script>

    <script>
      // Add your files here to include them in the random rotation
      const MUSIQUES_JEU = ["musique1.mp3", "musique2.mp3", "musique3.mp3", "musique4.mp3"];
      let indexMusique = 0;

      function jouerMusiqueAleatoire() {
        const musique = document.getElementById("musiqueJeu");
        musique.src = MUSIQUES_JEU[indexMusique % MUSIQUES_JEU.length];
        indexMusique++;
        musique.currentTime = 0;
        musique.play().catch(() => {});
      }

      // Play the next track with a 2s gap when a track ends
      document.getElementById("musiqueJeu").addEventListener("ended", () => {
        if (typeof jeuEnCours !== "undefined" && jeuEnCours && typeof musiqueActive !== "undefined" && musiqueActive) {
          setTimeout(jouerMusiqueAleatoire, 2000);
        }
      });

      function startGame() {
        document.getElementById("welcomeScreen").style.display = "none";
        let game = document.getElementById("gameContainer");
        game.style.display = "block";
        game.classList.add("fade");
        ajusterEchelle();
      }

      function ajusterEchelle() {
        const wrapper = document.getElementById("scaleWrapper");
        if (!wrapper) return;
        const LARGEUR_JEU = 1160;
        const HAUTEUR_JEU = 730;
        const scale = Math.min(
          window.innerWidth / LARGEUR_JEU,
          window.innerHeight / HAUTEUR_JEU
        );
        const left = Math.max(0, (window.innerWidth - LARGEUR_JEU * scale) / 2);
        wrapper.style.transform = `scale(${scale})`;
        wrapper.style.left = left + "px";
      }

      window.addEventListener("resize", ajusterEchelle);
      window.addEventListener("load", ajusterEchelle);
    </script>
  </body>
</html>
