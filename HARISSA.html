<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>HARISSA</title>

<style>

/* page */
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5e2c9;
    text-align:center;
}

/* écran de bienvenue centré */
#welcomeScreen{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* boite bienvenue */
.welcomeBox{
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;
}

/* boutons */
button{
    padding:10px 25px;
    font-size:16px;
    margin:10px;
    cursor:pointer;
}

/* bouton jouer */
.playBtn{
    background:#ff4d4d;
    color:white;
    border:none;
    border-radius:5px;
}

/* zone jeu cachée au début */
#gameContainer{
    display:none;
}

/* zone score */
#scoreZone{
    margin-top:10px;
}

/* zone du jeu */
#gameArea{
    width:800px;
    height:300px;
    border:3px solid black;
    margin:30px auto;
    background:#eee;
}

/* animation apparition */
.fade{
    animation:fadeIn 0.5s;
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

</style>

</head>

<body>

<!-- PAGE 1 : BIENVENUE -->
<div id="welcomeScreen">

<div class="welcomeBox">

<h1>Bienvenue dans HARISSA</h1>

<button class="playBtn" onclick="startGame()">Jouer</button>

</div>

</div>

<!-- PAGE 2 : JEU -->
<div id="gameContainer">

<h1>HARISSA</h1>

<div id="scoreZone">
Score : 0 | Score précédent : 0
</div>

<div id="gameArea"></div>

<div>
<button>Start</button>
<button>Restart</button>
</div>

</div>

<script>

/* passer de bienvenue au jeu */

function startGame(){

document.getElementById("welcomeScreen").style.display="none";

let game=document.getElementById("gameContainer");

game.style.display="block";

game.classList.add("fade");

}

</script>

</body>

</html>
